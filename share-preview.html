<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="워커 없이 공유 이미지를 바로 확인하는 로컬 미리보기 페이지">
  <title>공유 이미지 로컬 미리보기 | Japanote</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="icon" type="image/png" href="assets/images/favicon.png">
  <link rel="stylesheet" href="assets/css/styles.css?v=838bf6f9">
  <style>
    .share-preview-page {
      display: grid;
      gap: 24px;
      max-width: 1120px;
      margin: 0 auto;
      padding: 24px 0 40px;
    }

    .share-preview-panel {
      display: grid;
      gap: 20px;
      padding: 24px;
      border: 1px solid var(--line);
      border-radius: var(--radius-xl);
      background: var(--surface);
      box-shadow: var(--shadow-soft);
    }

    .share-preview-panel h1,
    .share-preview-panel h2,
    .share-preview-panel p {
      margin: 0;
    }

    .share-preview-form {
      display: grid;
      gap: 16px;
    }

    .share-preview-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 16px;
    }

    .share-preview-field {
      display: grid;
      gap: 8px;
    }

    .share-preview-field label {
      font-weight: 700;
    }

    .share-preview-field input,
    .share-preview-field textarea {
      width: 100%;
      min-height: 48px;
      padding: 12px 14px;
      border: 1px solid var(--line);
      border-radius: 14px;
      background: var(--surface-strong);
      color: var(--text);
      font: inherit;
    }

    .share-preview-field textarea {
      min-height: 84px;
      resize: vertical;
    }

    .share-preview-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
    }

    .share-preview-meta {
      display: grid;
      gap: 12px;
      padding: 16px;
      border-radius: 18px;
      background: rgba(255, 255, 255, 0.72);
      border: 1px solid rgba(25, 21, 22, 0.08);
    }

    .share-preview-meta code,
    .share-preview-meta pre {
      margin: 0;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .share-preview-canvas {
      display: grid;
      gap: 16px;
    }

    .share-preview-image-wrap {
      display: grid;
      place-items: center;
      min-height: 280px;
      padding: 18px;
      border: 1px solid var(--line);
      border-radius: var(--radius-xl);
      background:
        radial-gradient(circle at top left, rgba(255, 183, 183, 0.18), transparent 24%),
        linear-gradient(180deg, rgba(255, 255, 255, 0.92), rgba(252, 237, 225, 0.92));
      box-shadow: var(--shadow-soft);
      overflow: auto;
    }

    .share-preview-image {
      display: block;
      width: min(100%, 900px);
      height: auto;
      border-radius: 22px;
      box-shadow: 0 18px 40px rgba(106, 64, 41, 0.18);
      background: white;
    }

    .share-preview-status {
      color: var(--muted);
      font-size: 0.95rem;
    }

    .share-preview-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 6px 12px;
      border-radius: 999px;
      background: rgba(255, 107, 107, 0.1);
      color: #c44c4c;
      font-size: 0.85rem;
      font-weight: 700;
    }

    @media (max-width: 768px) {
      .share-preview-page {
        padding-top: 12px;
      }

      .share-preview-panel {
        padding: 18px;
      }

      .share-preview-grid,
      .share-preview-actions {
        display: grid;
      }
    }
  </style>
</head>
<body>
  <div class="page-shell">
    <header class="topbar">
      <a class="brand" href="index.html">
        <span class="brand-mark" aria-hidden="true"><img src="assets/images/favicon.png" alt=""></span>
        <div>
          <p class="brand-name">Japanote</p>
          <p class="brand-sub">공유 이미지 로컬 미리보기</p>
        </div>
      </a>
      <nav class="nav-links">
        <a href="index.html">홈</a>
        <a href="share-preview.html" aria-current="page">미리보기</a>
      </nav>
    </header>

    <main class="share-preview-page">
      <section class="share-preview-panel" aria-labelledby="share-preview-title">
        <div>
          <p class="eyebrow">LOCAL PREVIEW</p>
          <h1 id="share-preview-title">워커 없이 현재 `shared.js` 로 바로 렌더링해요</h1>
          <p>이 페이지는 <code>functions/challenge-preview/shared.js</code> 를 브라우저에서 직접 불러와서 공유 이미지를 생성합니다.</p>
        </div>

        <div class="share-preview-badge" id="share-preview-badge">로컬 서버에서 현재 shared.js를 바로 테스트하는 중입니다</div>

        <form class="share-preview-form" id="share-preview-form">
          <div class="share-preview-grid">
            <div class="share-preview-field">
              <label for="share-preview-total">총 문제 수</label>
              <input id="share-preview-total" name="total" type="number" min="0" step="1" inputmode="numeric">
            </div>

            <div class="share-preview-field">
              <label for="share-preview-correct">맞힌 개수</label>
              <input id="share-preview-correct" name="correct" type="number" min="0" step="1" inputmode="numeric">
            </div>
          </div>

          <div class="share-preview-actions">
            <button class="primary-btn button-with-icon" type="submit">
              <span class="material-symbols-rounded" aria-hidden="true">visibility</span>
              로컬 렌더링
            </button>
            <button class="secondary-btn button-with-icon" id="share-preview-reset" type="button">
              <span class="material-symbols-rounded" aria-hidden="true">refresh</span>
              기본값으로 되돌리기
            </button>
          </div>
        </form>

        <div class="share-preview-meta" aria-live="polite">
          <div>
            <strong>사용 모듈</strong>
            <div><code id="share-preview-module-path">functions/challenge-preview/shared.js</code></div>
          </div>
          <div>
            <strong>현재 scoreLabel</strong>
            <pre id="share-preview-score-label">-</pre>
          </div>
          <div>
            <strong>현재 본문 줄</strong>
            <pre id="share-preview-description-lines">-</pre>
          </div>
        </div>
      </section>

      <section class="share-preview-panel share-preview-canvas" aria-labelledby="share-preview-image-title">
        <div>
          <h2 id="share-preview-image-title">현재 이미지</h2>
          <p class="share-preview-status" id="share-preview-status">값을 입력하고 렌더링을 눌러 주세요.</p>
        </div>
        <div class="share-preview-image-wrap">
          <img class="share-preview-image" id="share-preview-image" alt="공유 이미지 로컬 미리보기">
        </div>
      </section>
    </main>
  </div>

  <script type="module">
    const form = document.getElementById("share-preview-form");
    const totalInput = document.getElementById("share-preview-total");
    const correctInput = document.getElementById("share-preview-correct");
    const resetButton = document.getElementById("share-preview-reset");
    const image = document.getElementById("share-preview-image");
    const status = document.getElementById("share-preview-status");
    const scoreLabel = document.getElementById("share-preview-score-label");
    const descriptionLines = document.getElementById("share-preview-description-lines");
    const badge = document.getElementById("share-preview-badge");
    const searchParams = new URLSearchParams(window.location.search);

    const defaultState = {
      total: 5,
      correct: 2
    };

    let currentImageUrl = "";
    let illustrationHref = "";

    function updateBadge() {
      if (window.location.protocol === "file:") {
        badge.textContent = "file:// 로는 반영되지 않습니다. npm run dev 같은 HTTP 서버로 열어 주세요.";
        return;
      }

      badge.textContent = "로컬 서버에서 현재 shared.js를 바로 테스트하는 중입니다";
    }

    function normalizeNumber(value, fallback) {
      if (value === null || value === undefined || String(value).trim() === "") {
        return fallback;
      }
      const parsed = Number(value);
      if (!Number.isFinite(parsed) || parsed < 0) {
        return fallback;
      }
      return Math.floor(parsed);
    }

    function readStateFromInputs() {
      const total = normalizeNumber(totalInput.value, defaultState.total);
      const correct = Math.min(normalizeNumber(correctInput.value, defaultState.correct), total);
      return { total, correct };
    }

    function writeStateToInputs(state) {
      totalInput.value = String(state.total);
      correctInput.value = String(Math.min(state.correct, state.total));
    }

    function createPayload(state) {
      if (!state.total) {
        return {};
      }

      return {
        sr: [state.total, state.correct, Math.max(state.total - state.correct, 0)]
      };
    }

    function toDescriptionLines(previewText, fallbackPrompt) {
      if (Array.isArray(previewText?.descriptionLines) && previewText.descriptionLines.length) {
        return previewText.descriptionLines;
      }

      const challengeLabel = String(
        previewText?.challengeLabel ||
        previewText?.description ||
        fallbackPrompt ||
        ""
      ).trim();

      return challengeLabel ? [challengeLabel] : [];
    }

    async function loadIllustrationHref() {
      if (illustrationHref) {
        return illustrationHref;
      }

      const response = await fetch(`./assets/images/social-preview-traced-quantized.svg?t=${Date.now()}`);

      if (!response.ok) {
        throw new Error("일러스트 SVG를 불러오지 못했습니다.");
      }

      const svgText = await response.text();
      const blob = new Blob([svgText], { type: "image/svg+xml;charset=utf-8" });
      illustrationHref = await new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = () => resolve(String(reader.result || ""));
        reader.onerror = () => reject(new Error("일러스트 SVG를 읽지 못했습니다."));
        reader.readAsDataURL(blob);
      });

      return illustrationHref;
    }

    async function loadPreviewModule() {
      const moduleUrl = new URL("./functions/challenge-preview/shared.js", window.location.href);
      moduleUrl.searchParams.set("t", String(Date.now()));
      return import(moduleUrl.toString());
    }

    async function renderPreview() {
      status.textContent = "최신 shared.js를 다시 불러와 렌더링하는 중입니다.";

      try {
        const state = readStateFromInputs();
        const [{ buildPreviewText, buildPreviewImageSvg, DEFAULT_CHALLENGE_PROMPT }, loadedIllustrationHref] = await Promise.all([
          loadPreviewModule(),
          loadIllustrationHref()
        ]);
        const previewText = buildPreviewText(createPayload(state));
        const lines = toDescriptionLines(previewText, DEFAULT_CHALLENGE_PROMPT);
        const svg = buildPreviewImageSvg({
          ...previewText,
          descriptionLines: lines,
          illustrationHref: loadedIllustrationHref
        });

        if (currentImageUrl) {
          URL.revokeObjectURL(currentImageUrl);
        }

        currentImageUrl = URL.createObjectURL(new Blob([svg], { type: "image/svg+xml;charset=utf-8" }));
        image.src = currentImageUrl;
        scoreLabel.textContent = previewText?.scoreLabel || "-";
        descriptionLines.textContent = lines.length ? lines.join("\n") : "-";
        status.textContent = "로컬 렌더링 완료";

        const currentUrl = new URL(window.location.href);
        currentUrl.searchParams.set("total", String(state.total));
        currentUrl.searchParams.set("correct", String(state.correct));
        window.history.replaceState({}, "", currentUrl.toString());
      } catch (error) {
        status.textContent = error instanceof Error ? error.message : "로컬 렌더링에 실패했습니다.";
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      renderPreview();
    });

    resetButton.addEventListener("click", () => {
      writeStateToInputs(defaultState);
      renderPreview();
    });

    updateBadge();
    writeStateToInputs({
      total: normalizeNumber(searchParams.get("total"), defaultState.total),
      correct: normalizeNumber(searchParams.get("correct"), defaultState.correct)
    });

    renderPreview();
  </script>
</body>
</html>
